server:
  listen: ":8080"
  hot_reload: false
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

runtime:
  environment: development

logging:
  level: info
  format: text
  output: stdout

admin:
  require_auth: true
  header: X-Gonk-Admin-Token
  token: "${GONK_ADMIN_TOKEN:-demo-admin-token}"

audit:
  enabled: true

metrics:
  enabled: true
  path: /metrics

auth:
  jwt:
    enabled: true
    secret_key: "${JWT_SECRET:-demo-secret-change-me}"
    header: Authorization
    prefix: Bearer
    expiry_check: true
    validate_roles: true
    validate_scopes: true

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200
  by: ip

routes:
  - name: public-status
    path: /public/*
    methods: [GET]
    upstreams:
      - url: http://machine-api-a:3000
        weight: 100
        health_check: /health
    strip_path: true
    auth:
      type: none
      required: false
    headers:
      X-Gateway: gonk
      X-Example: secure-edge-api

  - name: machine-data
    path: /api/machines/*
    methods: [GET, POST]
    upstreams:
      - url: http://machine-api-a:3000
        weight: 70
        health_check: /health
      - url: http://machine-api-b:3000
        weight: 30
        health_check: /health
    load_balancing:
      strategy: weighted
      health_check_interval: 10s
      health_check_timeout: 3s
    auth:
      type: jwt
      required: true
      allowed_roles: [operator, engineer, admin]
      required_scopes: [read:api]
      permissions:
        - role: operator
          methods: [GET]
          scopes: [read:api]
        - role: engineer
          methods: [GET, POST]
          scopes: [read:api]
        - role: admin
          methods: [GET, POST]
          scopes: [read:api]
    cache:
      enabled: true
      ttl: 30s
      methods: [GET]
    circuit_breaker:
      enabled: true
      max_failures: 5
      reset_timeout: 60s
      half_open_max_reqs: 3
    headers:
      X-Gateway: gonk

  - name: command-api
    path: /api/commands/*
    methods: [POST]
    upstreams:
      - url: http://machine-api-a:3000
        weight: 100
        health_check: /health
    auth:
      type: jwt
      required: true
      allowed_roles: [engineer, admin]
      required_scopes: [write:commands]
      permissions:
        - role: engineer
          methods: [POST]
          scopes: [write:commands]
        - role: admin
          methods: [POST]
          scopes: [write:commands]
    rate_limit:
      enabled: true
      requests_per_second: 5
      burst: 10
      by: ip
    circuit_breaker:
      enabled: true
      max_failures: 3
      reset_timeout: 30s
      half_open_max_reqs: 1
