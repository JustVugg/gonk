services:
  gonk:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: ["-config", "/etc/gonk/gonk.yaml"]
    volumes:
      - ./gonk.yaml:/etc/gonk/gonk.yaml:ro
      - ./certs:/certs
    ports:
      - "8443:8443"
    depends_on:
      - backend

  backend:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backend
    environment:
      BACKEND_NAME: mtls-backend
