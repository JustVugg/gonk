server:
  listen: ":8080"
  hot_reload: false
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

logging:
  level: info
  format: text
  output: stdout

metrics:
  enabled: true
  path: /metrics

auth:
  jwt:
    enabled: true
    secret_key: "${JWT_SECRET:-demo-secret-change-me}"
    header: Authorization
    prefix: Bearer
    expiry_check: true
    validate_roles: true
    validate_scopes: true

rate_limit:
  enabled: true
  requests_per_second: 50
  burst: 100
  by: ip

routes:
  - name: protected-api
    path: /api/*
    methods: [GET, POST]
    upstreams:
      - url: http://backend-a:3000
        weight: 70
        health_check: /health
      - url: http://backend-b:3000
        weight: 30
        health_check: /health
    load_balancing:
      strategy: weighted
      health_check_interval: 10s
      health_check_timeout: 3s
    auth:
      type: jwt
      required: true
      allowed_roles: [user, admin]
      required_scopes: [read:api]
      permissions:
        - role: user
          methods: [GET]
          scopes: [read:api]
        - role: admin
          methods: [GET, POST]
          scopes: [read:api]
    headers:
      X-Gateway: gonk
      X-Gateway-Demo: quickstart

  - name: public-api
    path: /public/*
    methods: [GET]
    upstreams:
      - url: http://backend-a:3000
        weight: 100
    auth:
      type: none
      required: false

  - name: backend-health
    path: /backend/*
    methods: [GET]
    upstreams:
      - url: http://backend-a:3000
        weight: 100
    strip_path: true
    auth:
      type: none
      required: false
